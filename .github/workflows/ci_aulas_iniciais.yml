name: CI - Aulas (Linting, PEP8 e Testes)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

jobs:
  qualidade_codigo:
    name: Validação de Sintaxe, PEP8 e Testes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.10', '3.11' ]

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flake8 pytest
          fi

      - name: Detectar presença de testes
        id: detect_tests
        run: |
          if find . -name "test_*.py" -not -path "./.venv/*" | grep -q .; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Validar Erros Críticos de Sintaxe (flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv

      - name: Avaliar Boas Práticas (PEP8)
        run: |
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv

      - name: Executar Testes (pytest)
        if: steps.detect_tests.outputs.has_tests == 'true'
        run: |
          pytest -q