name: CD - Projeto Final (Unattended Bot & Secrets)

on:
  # Agendamento Automático: Roda diariamente à meia-noite (00:00 UTC)
  schedule:
    - cron: '0 0 * * *'
  # Disparo nos Pull Requests e merges da branch main
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  orquestrador_producao:
    name: Executar Robô de Produção (Unattended)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependências do Projeto
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Injeção das credenciais cadastradas em Settings -> Secrets and variables -> Actions
      - name: Executar Bot Unattended com Variáveis de Ambiente
        env:
          EMAIL_REMETENTE: ${{ secrets.SMTP_EMAIL_USER }}
          SENHA_APLICACAO: ${{ secrets.SMTP_EMAIL_PASS }}
          URL_SISTEMA_LEGADO: ${{ secrets.URL_SISTEMA_PROD }}
        run: |
          if [ -f main.py ]; then python main.py; else echo "Arquivo main.py não encontrado."; fi