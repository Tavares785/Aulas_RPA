name: Pipeline - Aulas 10 e 11 (Extração e Artefatos Excel)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]
  workflow_dispatch: # Permite disparo manual via botão na interface

jobs:
  extracao_e_artefatos:
    name: Processar PDFs e Guardar Planilha
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Bibliotecas de Extração de Dados
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl pdfplumber requests beautifulsoup4

      - name: Executar Script Extrator (Leitor de Faturas PDF)
        run: |
          # Executa o script do aluno que gera o arquivo Excel
          python leitor_faturas_pdf.py || true

      # Disponibiliza o arquivo Excel para download na interface do GitHub
      - name: Upload da Planilha Gerada como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-faturas-excel
          path: relatorio_faturas.xlsx
          if-no-files-found: ignore
          retention-days: 7