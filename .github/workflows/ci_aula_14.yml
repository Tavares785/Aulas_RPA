name: CI - AULA14 (Validação de Estrutura de Repositório)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validar_estrutura:
    name: Validação de Estrutura e Boas Práticas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Verificar presença de requirements.txt
        id: check_requirements
        run: |
          if [ -f "requirements.txt" ]; then
            echo "status=presente" >> $GITHUB_OUTPUT
            echo "✔ requirements.txt encontrado."
          else
            echo "status=ausente" >> $GITHUB_OUTPUT
            echo "AVISO: requirements.txt não encontrado na raiz do repositório."
          fi

      - name: Verificar presença e conteúdo de .gitignore
        id: check_gitignore
        run: |
          if [ -f ".gitignore" ]; then
            echo "status=presente" >> $GITHUB_OUTPUT
            echo "✔ .gitignore encontrado. Validando conteúdo..."

            if grep -qxF '.venv/' .gitignore; then
              echo "  ✔ Linha '.venv/' presente no .gitignore."
            else
              echo "  AVISO: Linha '.venv/' ausente no .gitignore."
            fi

            if grep -qxF '*.log' .gitignore; then
              echo "  ✔ Linha '*.log' presente no .gitignore."
            else
              echo "  AVISO: Linha '*.log' ausente no .gitignore."
            fi
          else
            echo "status=ausente" >> $GITHUB_OUTPUT
            echo "AVISO: .gitignore não encontrado na raiz do repositório."
          fi

      - name: Verificar presença de README.md
        id: check_readme
        run: |
          if [ -f "README.md" ]; then
            echo "status=presente" >> $GITHUB_OUTPUT
            echo "✔ README.md encontrado."
          else
            echo "status=ausente" >> $GITHUB_OUTPUT
            echo "AVISO: README.md não encontrado na raiz do repositório."
          fi

      - name: Resumo Consolidado
        run: |
          echo "=============================="
          echo "  RESUMO — AULA14"
          echo "=============================="

          PRESENTES=""
          AUSENTES=""

          if [ "${{ steps.check_requirements.outputs.status }}" = "presente" ]; then
            PRESENTES="$PRESENTES  ✔ requirements.txt\n"
          else
            AUSENTES="$AUSENTES  ✘ requirements.txt\n"
          fi

          if [ "${{ steps.check_gitignore.outputs.status }}" = "presente" ]; then
            PRESENTES="$PRESENTES  ✔ .gitignore\n"
          else
            AUSENTES="$AUSENTES  ✘ .gitignore\n"
          fi

          if [ "${{ steps.check_readme.outputs.status }}" = "presente" ]; then
            PRESENTES="$PRESENTES  ✔ README.md\n"
          else
            AUSENTES="$AUSENTES  ✘ README.md\n"
          fi

          echo ""
          echo "Arquivos presentes:"
          if [ -n "$PRESENTES" ]; then
            printf "$PRESENTES"
          else
            echo "  (nenhum)"
          fi

          echo ""
          echo "Arquivos ausentes:"
          if [ -n "$AUSENTES" ]; then
            printf "$AUSENTES"
          else
            echo "  (nenhum — repositório bem estruturado!)"
          fi

          echo ""
          echo "=============================="
          echo "Validação pedagógica concluída."
          echo "=============================="
          exit 0
