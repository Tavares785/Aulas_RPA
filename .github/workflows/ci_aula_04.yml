name: CI - Aula 04 (Matriz de Testes e Cobertura)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

jobs:
  testes_unitarios:
    name: Executar Testes em Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    # Executa a suíte em paralelo para testar compatibilidade de versão
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache de Dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Bateria de Testes com PyTest
        run: |
          # Executa o pytest e gera relatório de cobertura no terminal
          pytest --cov=. --cov-report=term-missing --cov-fail-under=80 --ignore=.venv