name: CI - Aulas 12 e 13 (APIs REST, SMTP Mock e Logging)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

jobs:
  validacao_integracao:
    name: Sintaxe, Execução Controlada e Verificação de Log
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests tenacity
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # Verificação de sintaxe bloqueante — falha imediata se houver erro de sintaxe
      - name: Verificar Sintaxe - bot_cotacao_alerta.py (AULA12)
        run: |
          python -m py_compile AULA12/bot_cotacao_alerta.py

      # Verificação de sintaxe bloqueante — falha imediata se houver erro de sintaxe
      - name: Verificar Sintaxe - bot_faturamento_avancado.py (AULA13)
        run: |
          python -m py_compile AULA13/bot_faturamento_avancado.py

      # Execução tolerada — MOCK_EMAIL=true evita envio real de e-mails; || true ignora falhas de rede/runtime
      - name: Executar Bot de Cotação e Alerta (AULA12)
        env:
          MOCK_EMAIL: "true"
        run: |
          python AULA12/bot_cotacao_alerta.py || true

      # Execução tolerada — falhas de rede ou credenciais são ignoradas com || true
      - name: Executar Bot de Faturamento Avançado (AULA13)
        run: |
          python AULA13/bot_faturamento_avancado.py || true

      # Verificação obrigatória — confirma que ao menos um dos bots gerou o arquivo de log
      - name: Verificar Criação do Arquivo de Log (app_rpa.log)
        run: |
          if [ ! -f app_rpa.log ]; then
            echo "ERRO: app_rpa.log não foi criado. Evidência de não-execução dos bots."
            exit 1
          fi
          LINE_COUNT=$(wc -l < app_rpa.log)
          if [ "$LINE_COUNT" -lt 1 ]; then
            echo "ERRO: app_rpa.log existe mas está vazio (0 linhas)."
            exit 1
          fi
          echo "OK: app_rpa.log encontrado com $LINE_COUNT linha(s)."
