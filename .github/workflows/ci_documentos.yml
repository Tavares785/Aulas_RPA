name: CI – Validação de Documentos Markdown

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar-markdown:
    name: Verificar arquivos Markdown obrigatórios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # AULA02 – lab-02.md e lab-02_resp.md
      # ------------------------------------------------------------------
      - name: Verificar Markdown – AULA02
        shell: bash
        run: |
          STATUS_LAB02_MD="VÁLIDO"
          STATUS_LAB02_RESP="VÁLIDO"

          # lab-02.md
          if [ ! -s "AULA02/lab-02.md" ]; then
            echo "AVISO: AULA02/lab-02.md está ausente ou vazio."
            STATUS_LAB02_MD="AVISO"
          elif ! grep -qP '^#' "AULA02/lab-02.md"; then
            echo "AVISO: AULA02/lab-02.md não contém título Markdown (linha iniciada com '#')."
            STATUS_LAB02_MD="AVISO"
          else
            echo "OK: AULA02/lab-02.md – não-vazio e contém título Markdown."
          fi

          # lab-02_resp.md
          if [ ! -s "AULA02/lab-02_resp.md" ]; then
            echo "AVISO: AULA02/lab-02_resp.md está ausente ou vazio."
            STATUS_LAB02_RESP="AVISO"
          elif ! grep -qP '^#' "AULA02/lab-02_resp.md"; then
            echo "AVISO: AULA02/lab-02_resp.md não contém título Markdown (linha iniciada com '#')."
            STATUS_LAB02_RESP="AVISO"
          else
            echo "OK: AULA02/lab-02_resp.md – não-vazio e contém título Markdown."
          fi

          echo "RESULTADO_LAB02_MD=$STATUS_LAB02_MD"   >> "$GITHUB_ENV"
          echo "RESULTADO_LAB02_RESP=$STATUS_LAB02_RESP" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # AULA03 – lab-03.md e lab-03_resp.md
      # ------------------------------------------------------------------
      - name: Verificar Markdown – AULA03
        shell: bash
        run: |
          STATUS_LAB03_MD="VÁLIDO"
          STATUS_LAB03_RESP="VÁLIDO"

          # lab-03.md
          if [ ! -s "AULA03/lab-03.md" ]; then
            echo "AVISO: AULA03/lab-03.md está ausente ou vazio."
            STATUS_LAB03_MD="AVISO"
          elif ! grep -qP '^#' "AULA03/lab-03.md"; then
            echo "AVISO: AULA03/lab-03.md não contém título Markdown (linha iniciada com '#')."
            STATUS_LAB03_MD="AVISO"
          else
            echo "OK: AULA03/lab-03.md – não-vazio e contém título Markdown."
          fi

          # lab-03_resp.md
          if [ ! -s "AULA03/lab-03_resp.md" ]; then
            echo "AVISO: AULA03/lab-03_resp.md está ausente ou vazio."
            STATUS_LAB03_RESP="AVISO"
          elif ! grep -qP '^#' "AULA03/lab-03_resp.md"; then
            echo "AVISO: AULA03/lab-03_resp.md não contém título Markdown (linha iniciada com '#')."
            STATUS_LAB03_RESP="AVISO"
          else
            echo "OK: AULA03/lab-03_resp.md – não-vazio e contém título Markdown."
          fi

          echo "RESULTADO_LAB03_MD=$STATUS_LAB03_MD"   >> "$GITHUB_ENV"
          echo "RESULTADO_LAB03_RESP=$STATUS_LAB03_RESP" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # AULA05 – AVALIACAO_PROCESSO.md
      # ------------------------------------------------------------------
      - name: Verificar Markdown – AULA05
        shell: bash
        run: |
          STATUS_AVALIACAO="VÁLIDO"

          if [ ! -f "AULA05/AVALIACAO_PROCESSO.md" ]; then
            echo "AVISO: AULA05/AVALIACAO_PROCESSO.md está ausente."
            STATUS_AVALIACAO="AVISO"
          elif [ ! -s "AULA05/AVALIACAO_PROCESSO.md" ]; then
            echo "AVISO: AULA05/AVALIACAO_PROCESSO.md existe mas está vazio."
            STATUS_AVALIACAO="AVISO"
          elif ! grep -qP '^#' "AULA05/AVALIACAO_PROCESSO.md"; then
            echo "AVISO: AULA05/AVALIACAO_PROCESSO.md não contém título Markdown (linha iniciada com '#')."
            STATUS_AVALIACAO="AVISO"
          else
            echo "OK: AULA05/AVALIACAO_PROCESSO.md – presente, não-vazio e contém título Markdown."
          fi

          echo "RESULTADO_AVALIACAO=$STATUS_AVALIACAO" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # Resumo consolidado
      # ------------------------------------------------------------------
      - name: Resumo consolidado das validações
        shell: bash
        run: |
          echo "=============================================="
          echo "  RESUMO – Validação de Documentos Markdown  "
          echo "=============================================="
          echo ""

          VALIDOS=""
          AVISOS=""

          # Função auxiliar para classificar cada arquivo
          classificar() {
            local ARQUIVO="$1"
            local STATUS="$2"
            if [ "$STATUS" = "VÁLIDO" ]; then
              VALIDOS="$VALIDOS\n  ✔  $ARQUIVO"
            else
              AVISOS="$AVISOS\n  ⚠  $ARQUIVO"
            fi
          }

          classificar "AULA02/lab-02.md"           "$RESULTADO_LAB02_MD"
          classificar "AULA02/lab-02_resp.md"       "$RESULTADO_LAB02_RESP"
          classificar "AULA03/lab-03.md"            "$RESULTADO_LAB03_MD"
          classificar "AULA03/lab-03_resp.md"       "$RESULTADO_LAB03_RESP"
          classificar "AULA05/AVALIACAO_PROCESSO.md" "$RESULTADO_AVALIACAO"

          if [ -n "$VALIDOS" ]; then
            echo "Arquivos VÁLIDOS:"
            echo -e "$VALIDOS"
            echo ""
          fi

          if [ -n "$AVISOS" ]; then
            echo "Arquivos com AVISO (ausentes, vazios ou sem título '#'):"
            echo -e "$AVISOS"
            echo ""
            echo "Atenção: preencha os arquivos acima com conteúdo mínimo e um título Markdown."
          else
            echo "Todos os arquivos Markdown obrigatórios estão válidos."
          fi

          echo ""
          echo "=============================================="
          echo "  Validação pedagógica concluída (exit 0)    "
          echo "=============================================="

          # Caráter pedagógico: sempre exit 0, avisos não bloqueiam o pipeline
          exit 0
