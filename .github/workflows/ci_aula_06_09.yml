name: CI - Aulas 06 a 09 (Automação Web e Visão)

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

jobs:
  teste_rpa_web_desktop:
    name: Validar Bots Web e Desktop (Xvfb & Headless)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Instalação das dependências do Linux para simular tela e rodar o Google Chrome
      - name: Instalar Xvfb e Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxi6 libgconf-2-4 google-chrome-stable

      - name: Instalar Dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager pyautogui pytest pytest-xvfb
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Executa o script sob o servidor de display virtual Xvfb
      - name: Executar Teste Web em Display Virtual
        run: |
          xvfb-run --server-args="-screen 0 1920x1080x24" python -m unittest discover -s . -p "test_*.py" || true